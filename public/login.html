<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2d8b8b" />
  <title>Sign In — PurCheaper</title>
  <link rel="stylesheet" href="/css/site.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232d8b8b'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='16' font-family='sans-serif' font-weight='700'%3EP%3C/text%3E%3C/svg%3E" />
</head>
<body class="login-page">

  <!-- Minimal top bar -->
  <header class="login-topbar">
    <a class="brand" href="/">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#2d8b8b"/>
          <path d="M9 8h8a5 5 0 0 1 0 10H9V8z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <path d="M9 18h9M9 18v6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      PurCheaper
    </a>
    <a class="btn btn-ghost btn-sm" href="/">← Back to site</a>
  </header>

  <!-- Login card -->
  <main class="login-wrap">
    <div class="login-card">

      <!-- Logo + title -->
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none" aria-label="PurCheaper" role="img">
          <rect width="32" height="32" rx="8" fill="#2d8b8b"/>
          <path d="M9 8h8a5 5 0 0 1 0 10H9V8z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          <path d="M9 18h9M9 18v6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="brand" style="font-size:var(--text-lg)">PurCheaper</span>
      </div>

      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Access your logistics operations portal.</p>

      <!-- Role toggle -->
      <div class="role-tabs" role="tablist" aria-label="Account type">
        <button class="role-tab active" role="tab" aria-selected="true" data-role="partner" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Partner
        </button>
        <button class="role-tab" role="tab" aria-selected="false" data-role="driver" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Driver
        </button>
      </div>

      <!-- Login form -->
      <form class="login-form" id="login-form" novalidate>
        <div class="login-field">
          <label for="email">Email</label>
          <input
            id="email" name="email" type="email"
            class="login-input"
            placeholder="name@company.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="login-field">
          <div class="login-field-row">
            <label for="password">Password</label>
            <a href="/forgot-password">Forgot password?</a>
          </div>
          <input
            id="password" name="password" type="password"
            class="login-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="login-error" id="login-error" role="alert"></div>

        <button class="login-btn" type="submit">
          Sign In
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="login-footer">
        New partner? <a href="/partners">Apply for access →</a>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    // Role tab switching
    const tabs = document.querySelectorAll('.role-tab');
    let activeRole = 'partner';
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
        tab.classList.add('active');
        tab.setAttribute('aria-selected','true');
        activeRole = tab.dataset.role;
      });
    });

    // Login form
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      const btn = form.querySelector('.login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = form.email.value.trim();
      const password = form.password.value;

      try {
        let data;
        if (activeRole === 'driver') {
          const res = await fetch('/api/auth/driver/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password })
          });
          data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Login failed');
          localStorage.setItem('pc_driver_token', data.token);
          window.location.href = '/drivers';
        } else {
          const res = await fetch('/api/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password })
          });
          data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Login failed');
          localStorage.setItem('pc_token', data.token);
          window.location.href = '/dashboard';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = 'Sign In <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
      }
    });
  </script>
</body>
</html>
